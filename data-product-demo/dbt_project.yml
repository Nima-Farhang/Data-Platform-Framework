name: 'data_product_demo'
version: '1.0.0'
config-version: 2

profile: 'data_product_demo'

model-paths: ['models']
seed-paths: ['seeds']
snapshot-paths: ['snapshots']
analysis-paths: ['analyses']
test-paths: ['tests']

on-run-start:
  - "{{ set_query_tag() }}"

models:
  data_product_demo:
    raw:
      +schema: raw
      +materialized: view

    refined:
      +schema: refined
      +materialized: view

    modelled:
      +schema: modelled
      +materialized: table

    serving:
      +schema: serving
      +materialized: view

seeds:
  data_product_demo:
    +schema: raw

clean-targets:
  - 'target'
  - 'dbt_packages'
